# Cloudflare Pages 配置（真理源）
# 作用：明确告诉 wrangler 这是 Pages 项目，输出目录是 dist，
#       跳过框架自动探测（避免 wrangler 解析 vite.config.js 时
#       因 Node 专用模块 https/net/https-proxy-agent 失败）。
#
# 部署流程：
#   1. npm run build  → 产出 dist/（静态资源）
#   2. wrangler 自动部署 functions/ 目录为 Pages Functions（边缘代理）
#   3. _redirects / _headers 由 dist/ 中的同名文件提供

name = "github-navigator"
compatibility_date = "2026-06-26"
pages_build_output_dir = "./dist"

# Functions 自动从 functions/ 目录发现，无需额外配置
# 路由：
#   /api/gh/*             → functions/api/gh/[[path]].js  → api.github.com
#   /api/searx1~3/*       → functions/api/searx*/[[path]].js → 各 SearXNG 实例
